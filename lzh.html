            .page-foot div:last-child {
                border-right: 0px

            .cardinfo .ygqimg {
                width: 120px;
                position: absolute;
                right: 100px;
                top: calc(40% - 10px);
                z-index: 1000;
                opacity: 0.7
            }

            .gz {
                background-color: #5bc0de;
                text-align: center;
                padding: 10px 0;
                line-height: 25px
            }

            .gz a {
                background-color: #fff;
                display: inline-block;
                padding: 0 15px;
                border-radius: 15px;
                cursor: pointer;
                position: absolute;
                right: 10px
            }

            .gz a:link {
                color: #000;
                text-decoration: none
            }

            .gz a:visited {
                color: #000;
                text-decoration: none
            }

            .gz a:hover {
                color: #000;
                text-decoration: none
            }

            .gz a:active {
                color: #000;
                text-decoration: none
            }

            .cardpic {

                right: 10px;
                top: 155px;

                z-index: 999;
            }

            .vertical-text {
                writing-mode: vertical-rl;
                text-orientation: upright;
                font-size: 10px;
                z-index: 999;
                font-family: "仿宋",FangSong,STFangsong,serif
            }

            #qrcode canvas,#qrcode img {
                width: 100%;
                height: 100%
            }

            #saveToImg {
                color: red;
                margin-left: 20px;
                padding: 10px 0
            }

            .applyyj {
                text-align: center;
                background-color: #eba753;
                color: #ffffff;

                margin-left: 40px;
                margin-top: 20px
            }

            .showCardImg {
                z-index: 9999999;
                position: fixed;
                height: 100%;
                width: 100%;
                left: 0;
                top: 0;
                display: none
            }

            .showCardImgMask {
                position: fixed;
                z-index: 9998;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                background-color: #515151;
                opacity: 0.4;
                overflow: none;
                display: none
            }

            .showCardImgimg {
                width: 80%;

                border-radius: 10px;

            }

            .showCardImgimg img {
                width: 100%
            }

            .closeModel {

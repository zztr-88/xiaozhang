olid #ddd;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px;text-align:center;margin-bottom:10px;}.photo-placeholder img{width:120px;height:150px;border-radius: 5px;}.stamp-container{position:absolute;top:180px;right:30px;opacity:0.9;}.stamp{width:100px;height:100px;border:2px solid #c00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#c00;text-align:center;line-height:1.3;transform:rotate(-15deg);background:rgba(255,255,255,0.7);padding:10px;}.stamp::before{content:"";position:absolute;width:90%;height:90%;border:1px solid #c00;border-radius:50%;}.certificate-footer{margin-top:25px;padding:15px 25px;border-top:1px solid #eee;background:#f9f9f9;font-size:14px;display:flex;flex-direction:column;align-items:center;}.qr-section{display:flex;justify-content:center;align-items:center;gap:15px;margin-top:10px;}#qrCode{width:80px;height:80px;background:white;border:1px solid #ddd;}.footer-note{color:#666;font-size:13px;margin-top:8px;text-align:center;}.section-title{font-size:22px;color:var(--primary-blue);padding-bottom:12px;margin-bottom:20px;border-bottom:2px solid var(--secondary-green);font-weight:600;}.form-group{margin-bottom:20px;}label{display:block;margin-bottom:8px;font-weight:600;color:var(--primary-blue);}input,select{width:100%;padding:12px 15px;border:1px solid #ccc;border-radius:6px;font-size:16px;transition:border-color 0.3s;}input:focus,select:focus{outline:none;border-color:var(--primary-blue);box-shadow:0 0 0 3px rgba(26,61,124,0.2);}.checkbox-group{display:flex;align-items:center;gap:10px;margin:20px 0;}.checkbox-group input{width:auto;}.btn-group{display:flex;gap:15px;margin-top:15px;}.btn{padding:14px 25px;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;}.btn-primary{background:linear-gradient(to right,var(--primary-blue),#14336c);color ntainer{width:100%;max-width:500px;}.input-area,.preview-area{min-width:100%;}.form-row{flex-direction:column;gap:0;}.volume-container{width:100px;}}.ygqimg{width:130px;position:absolute;left: calc(50%);top:calc(60% - 60px);z-index:1000}</style>

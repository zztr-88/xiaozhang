<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康证明验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
        }

        :root {
            --primary-blue: #1a3d7c;
            --secondary-green: #006837;
            --light-gray: #f5f5f5;
            --dark-gray: #333;
        }

        body {
            background: linear-gradient(135deg, #e6f7ff 0%, #f0f7ff 100%);
            color: var(--dark-gray);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            padding: 15px 0;
            background: linear-gradient(to right, var(--primary-blue), #0d2c5e);
            color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            border-bottom: 4px solid var(--secondary-green);
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.2);
        }

        .description {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .input-area {
            flex: 1;
            min-width: 350px;
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .preview-area {
            flex: 1;
            min-width: 350px;
            padding: 25px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .certificate-container {
            position: relative;
            width: 500px;
            min-height: 380px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            padding: 0;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .certificate-header {
            background: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .certificate-title {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .certificate-body {
            display: flex;
            gap: 20px;
            padding: 0 25px;
        }

        .certificate-info-section {
            flex: 1;
        }

        .certificate-info {
            display: grid;
            grid-template-columns: 50px 1fr;
            gap: 8px 5px;
            font-size: 10px;
            margin-bottom: 12px;
        }

        .info-label {
            color: var(--primary-blue);
            font-weight: bold;
            text-align: right;
        }

        .info-value {
            color: #000;
            font-weight: 900;
        }

        .photo-section {
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .photo-placeholder {
            width: 120px;
            height: 150px;
            background: var(--light-gray);
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
        }

        .photo-placeholder img {
            width: 120px;
            height: 150px;
            border-radius: 5px;
        }

        .stamp-container {
            position: absolute;
            top: 180px;
            right: 30px;
            opacity: 0.9;
        }

        .stamp {
            width: 100px;
            height: 100px;
            border: 2px solid #c00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #c00;
            text-align: center;
            line-height: 1.3;
            transform: rotate(-15deg);
            background: rgba(255, 255, 255, 0.7);
            padding: 10px;
        }

        .stamp::before {
            content: "";
            position: absolute;
            width: 90%;
            height: 90%;
            border: 1px solid #c00;
            border-radius: 50%;
        }

        .certificate-footer {
            margin-top: 25px;
            padding: 15px 25px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        #qrCode {
            width: 80px;
            height: 80px;
            background: white;
            border: 1px solid #ddd;
        }

        .footer-note {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        .section-title {
            font-size: 22px;
            color: var(--primary-blue);
            padding-bottom: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--secondary-green);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-blue);
        }

        input,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(26, 61, 124, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input {
            width: auto;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .btn {
            padding: 14px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary-blue), #14336c);
            color: white;
            box-shadow: 0 4px 6px rgba(26, 61, 124, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #14336c, #0d2c5e);
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(26, 61, 124, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #eaeaea;
        }

        .tips {
            margin-top: 25px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 4px solid var(--primary-blue);
            font-size: 14px;
        }

        .tips p {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: #777;
            font-size: 14px;
        }

        .hide {
            display: none;
        }

        .preview-title {
            font-size: 22px;
            color: var(--primary-blue);
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--secondary-green);
            width: 100%;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .music-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease;
        }

        .music-controls:hover {
            transform: translateY(-5px);
        }

        .music-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: #0d2c5e;
            transform: scale(1.1);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 120px;
        }

        .volume-slider {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #d0d0d0;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-blue);
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-blue);
            cursor: pointer;
        }

        .audio-info {
            font-size: 12px;
            color: #444;
            margin-left: 5px;
            white-space: nowrap;
        }

        @media (max-width:900px) {
            .container {
                flex-direction: column;
            }

            .certificate-container {
                width: 100%;
                max-width: 500px;
            }

            .input-area,
            .preview-area {
                min-width: 100%;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .volume-container {
                width: 100px;
            }
        }

        .ygqimg {
            width: 130px;
            position: absolute;
            left: calc(50%);
            top: calc(60% - 60px);
            z-index: 1000
        }
    </style>
</head>
